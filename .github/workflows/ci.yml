name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: xifty-swift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtySwift
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v5
        with:
          path: XIFtySwift

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            XIFtySwift/.xifty-core -> target

      - name: Prepare core
        run: bash scripts/prepare-core.sh

      - name: Run Swift tests
        run: swift test

      - name: Run examples
        run: |
          swift run XIFtySwiftExample
          swift run XIFtySwiftGalleryExample
