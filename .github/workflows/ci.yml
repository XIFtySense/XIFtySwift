name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: xifty-swift-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ github.workspace }}/XIFtySwift
    steps:
      - name: Check out binding repo
        uses: actions/checkout@v5
        with:
          path: XIFtySwift

      - name: Check out core repo
        uses: actions/checkout@v5
        with:
          repository: XIFtySense/XIFty
          path: XIFty

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            XIFty -> target

      - name: Build core FFI library
        run: cargo build -p xifty-ffi --manifest-path ../XIFty/Cargo.toml

      - name: Run Swift tests
        run: swift test
